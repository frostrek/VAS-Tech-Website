<head>

  <link rel="manifest" href="/manifest.json" />

  <!-- Open Graph / Facebook -->

  <!-- Structured Data - Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "VAS Tech",
    "url": "https://info.vastech.com",
    "logo": "https://info.vastech.com/VAS_logo.png",
    "description": "AI-powered enterprise solutions including conversational AI agents, automation, and AI copilots.",
    "sameAs": [
      "https://www.linkedin.com/company/vastech",
      "https://twitter.com/vastech"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+1-289-438-4445",
      "contactType": "sales",
      "areaServed": ["IN", "US", "GB"],
      "availableLanguage": ["English"]
    },
    "address": [
      {
        "@type": "PostalAddress",
        "streetAddress": "McNicholl Circle",
        "addressLocality": "St Catharines",
        "addressRegion": "Ontario",
        "postalCode": "L2N 7C5",
        "addressCountry": "CA"

      {
        "@type": "PostalAddress",
        "addressLocality": "Austin",
        "addressRegion": "TX",
        "addressCountry": "US"
      },
      {
        "@type": "PostalAddress",
        "addressLocality": "London",
        "addressCountry": "GB"
      }
    ]
  }

  <!-- Structured Data - WebSite for Sitelinks Search Box -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "VAS Tech",
    "url": "https://info.vastech.com",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://info.vastech.com/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Structured Data - SoftwareApplication -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "VAS Tech AI Platform",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD",
      "description": "Contact for enterprise pricing"
    },
    "aggregateRating": {
      "@type": "AggregateRating",

      "ratingCount": "150"
    }
  }
  </script>
